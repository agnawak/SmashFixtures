services:
  api:
    build: .
    ports:
      - "8000:8000"
    environment:
      - API_KEY=${API_KEY}
      - ALLOWED_ORIGINS=${ALLOWED_ORIGINS}
    restart: unless-stopped
  fixtureui:
    build:
      context: ./frontend
      args:
        - VITE_API_URL=${VITE_API_URL:-http://api:8000}
    ports:
      - "3000:80"
    depends_on:
      - api
    restart: unless-stopped
  tunnel:
    image: cloudflare/cloudflared:latest
    command: tunnel --no-autoupdate run
    environment:
      - TUNNEL_TOKEN=${TUNNEL_TOKEN}
    depends_on:
      - api
    restart: unless-stopped